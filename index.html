<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WIFIPRO - Open in Chrome</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;min-height:100vh}
.wrap{max-width:480px;margin:auto;padding:20px;width:100%;text-align:center}
.card{background:#1e293b;border-radius:14px;padding:20px;margin-bottom:16px}
.logo{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#25d366,#128C7E);font-size:24px;font-weight:800;color:#fff;margin-bottom:10px}
h1{font-size:20px;font-weight:800;color:#fff;margin-bottom:4px}
.sub{font-size:13px;color:#94a3b8;margin-bottom:16px}
.summary{background:#0f172a;border-radius:10px;padding:16px;margin-bottom:16px;text-align:left}
.row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;border-bottom:1px solid #1e293b}
.row:last-child{border-bottom:none}
.label{color:#94a3b8}
.value{color:#f1f5f9;font-weight:600}
.btn{display:block;width:100%;background:linear-gradient(135deg,#25d366,#128C7E);color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;transition:opacity .2s;margin-bottom:8px}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:default}
.btn-outline{background:transparent;border:1px solid #334155;color:#e2e8f0;margin-top:8px}
.info{font-size:12px;color:#94a3b8;line-height:1.5}
#debug{font-size:11px;color:#f59e0b;background:#1e293b;padding:10px;border-radius:8px;margin-top:12px;word-break:break-all;text-align:left;display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">W</div>
    <h1>WIFIPRO</h1>
    <p class="sub" id="status">Loading your order...</p>
    <div class="summary">
      <div class="row"><span class="label">Package</span><span class="value" id="display-pkg">-</span></div>
      <div class="row"><span class="label">Price</span><span class="value" id="display-price">-</span></div>
      <div class="row"><span class="label">Name</span><span class="value" id="display-name">-</span></div>
    </div>
    <button class="btn" id="share-btn" onclick="tryShare()">Open in Chrome</button>
    <button class="btn btn-outline" onclick="showManual()">Show manual instructions</button>
    <div id="manual" style="display:none">
      <p class="info" style="margin-top:12px">1. Open Chrome</p>
      <p class="info">2. Type <strong style="color:#f1f5f9">http://192.168.88.1</strong></p>
      <p class="info">3. Tap "Open WhatsApp Now"</p>
    </div>
    <div id="debug"></div>
  </div>
</div>

<script>
var phone = "254728580415";
var pkg = "Internet Package";
var price = "KES 0";
var name = "";

(function(){
    var p = new URL(window.location.href).searchParams;
    phone = p.get("phone") || phone;
    pkg = p.get("pkg") || pkg;
    price = p.get("price") || price;
    name = p.get("name") || "";
    document.getElementById("display-pkg").textContent = pkg;
    document.getElementById("display-price").textContent = price;
    document.getElementById("display-name").textContent = name || "(not provided)";
    document.getElementById("status").textContent = "Your order is ready";
})();

function getMsg() {
    return "Hi WIFIPRO, I'd like to buy " + pkg + (name ? ". My name is " + name + "." : ".");
}

function dbg(t) {
    var d = document.getElementById("debug");
    d.style.display = "block";
    d.innerHTML += "<div>" + t + "</div>";
}

function copyText(t) {
    if (navigator.clipboard) navigator.clipboard.writeText(t);
    var ta = document.createElement('textarea');
    ta.value = t; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0,99999);
    document.execCommand('copy'); document.body.removeChild(ta);
}

function tryShare() {
    var msg = getMsg();
    var waUrl = "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);
    copyText(msg);

    dbg("navigator.share available: " + (typeof navigator.share));

    if (navigator.share) {
        var btn = document.getElementById("share-btn");
        btn.disabled = true;
        btn.textContent = "Opening...";

        navigator.share({ title: 'WIFIPRO Internet', text: msg, url: waUrl })
            .then(function() {
                dbg("Share succeeded");
                btn.textContent = "Done!";
            })
            .catch(function(err) {
                dbg("Share error: " + err.toString() + " | name: " + err.name);
                btn.disabled = false;
                btn.textContent = "Try again";
            });
    } else {
        dbg("navigator.share NOT available on this page");
        showManual();
    }
}

function showManual() {
    document.getElementById("manual").style.display = "block";
    copyText("http://192.168.88.1");
}
</script>
</body>
</html>
