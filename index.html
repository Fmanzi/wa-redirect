<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Order - WIFIPRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;min-height:100vh}
.wrap{max-width:480px;margin:auto;padding:20px;width:100%;text-align:center}
.card{background:#1e293b;border-radius:14px;padding:20px;margin-bottom:16px}
.logo{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#25d366,#128C7E);font-size:24px;font-weight:800;color:#fff;margin-bottom:10px}
h1{font-size:20px;font-weight:800;color:#fff;margin-bottom:4px}
.sub{font-size:13px;color:#94a3b8;margin-bottom:16px}
.summary{background:#0f172a;border-radius:10px;padding:16px;margin-bottom:16px;text-align:left}
.row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;border-bottom:1px solid #1e293b}
.row:last-child{border-bottom:none}
.label{color:#94a3b8}
.value{color:#f1f5f9;font-weight:600}
.value.price{color:#25d366;font-size:18px}
.btn{display:block;width:100%;background:linear-gradient(135deg,#25d366,#128C7E);color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:default}
.btn-outline{background:transparent;border:1px solid #334155;color:#e2e8f0;margin-top:8px}
.info{font-size:12px;color:#94a3b8;margin-top:10px;line-height:1.5}
.spinner{margin:20px auto;width:40px;height:40px;border:4px solid #334155;border-top-color:#25d366;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.wa-icon{display:inline-block;margin-right:6px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="loading-card">
    <div class="spinner"></div>
    <h1>Loading your order...</h1>
  </div>

  <div class="card" id="confirm-card" style="display:none">
    <div class="logo">W</div>
    <h1>Confirm Your Order</h1>
    <p class="sub">Review your order details below</p>

    <div class="summary">
      <div class="row">
        <span class="label">Package</span>
        <span class="value" id="display-pkg">-</span>
      </div>
      <div class="row">
        <span class="label">Price</span>
        <span class="value price" id="display-price">-</span>
      </div>
      <div class="row">
        <span class="label">Your Name</span>
        <span class="value" id="display-name">-</span>
      </div>
    </div>

    <button class="btn" id="send-btn" onclick="sendOrder()">
      Confirm & Send to WhatsApp
    </button>
    <p class="info">After sending, pay via M-Pesa Send Money to <strong>254728580415</strong>. We'll reply with your voucher.</p>
    <button class="btn btn-outline" onclick="copyMsg()">Copy Message Instead</button>
    <p class="info" id="copy-info" style="display:none">Message copied ✓</p>
  </div>
</div>

<script>
var phone = "254728580415";
var pkg = "";
var price = "";
var name = "";

function getParam(p) {
    return new URL(window.location.href).searchParams.get(p) || "";
}

phone = getParam("phone") || phone;
pkg = getParam("pkg") || "Internet Package";
price = getParam("price") || "KES 0";
name = getParam("name") || "";

document.getElementById("display-pkg").textContent = pkg;
document.getElementById("display-price").textContent = price;
document.getElementById("display-name").textContent = name || "(not provided)";

setTimeout(function() {
    document.getElementById("loading-card").style.display = "none";
    document.getElementById("confirm-card").style.display = "block";
}, 400);

function getMessage() {
    var msg = "Hi WIFIPRO, I'd like to buy " + pkg + ".";
    if (name) msg += " My name is " + name + ".";
    return msg;
}

function copyText(t) {
    if (navigator.clipboard) navigator.clipboard.writeText(t);
    var ta = document.createElement('textarea');
    ta.value = t; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0,99999);
    document.execCommand('copy'); document.body.removeChild(ta);
}

function sendOrder() {
    var msg = getMessage();
    var btn = document.getElementById("send-btn");
    btn.disabled = true;
    btn.textContent = "Opening WhatsApp...";

    var url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);
    copyText(msg);

    if (navigator.share) {
        navigator.share({ title: 'WIFIPRO Internet', text: msg, url: url })
            .catch(function(){ openWa(url, msg); });
    } else {
        openWa(url, msg);
    }
}

function openWa(url, msg) {
    var intent = "intent://wa.me/" + phone + "?text=" + encodeURIComponent(msg) + "#Intent;scheme=https;package=com.android.chrome;end";
    var w = window.open(intent, "_blank");
    if (!w || w.closed) {
        window.location.href = url;
    }
    setTimeout(function() {
        var btn = document.getElementById("send-btn");
        btn.disabled = false;
        btn.textContent = "Confirm & Send to WhatsApp";
    }, 3000);
}

function copyMsg() {
    copyText(getMessage());
    document.getElementById("copy-info").style.display = "block";
}
</script>
</body>
</html>
